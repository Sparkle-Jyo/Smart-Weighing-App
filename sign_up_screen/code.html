<h2 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight tracking-tight text-center mb-2">Create Account</h2>
<p class="text-slate-500 dark:text-slate-400 text-center text-sm mb-8">Start your health journey today</p>
<form action="../home_dashboard/code.html" class="space-y-5">
<!-- Full Name -->
<div>
<label class="block text-slate-700 dark:text-slate-200 text-sm font-semibold mb-2">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="w-full pl-12 pr-4 py-3.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Address -->
<div>
<label class="block text-slate-700 dark:text-slate-200 text-sm font-semibold mb-2">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="john@example.com" type="email"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Age -->
<div>
<label class="block text-slate-700 dark:text-slate-200 text-sm font-semibold mb-2">Age</label>
<input class="w-full px-4 py-3.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="25" type="number"/>
</div>
<!-- Gender -->
<div>
<label class="block text-slate-700 dark:text-slate-200 text-sm font-semibold mb-2">Gender</label>
<select class="w-full px-4 py-3.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none appearance-none">
<option value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>
</div>
</div>
<!-- Height Slider -->
<div class="py-2">
<div class="flex justify-between items-center mb-2">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold">Height</label>
<span class="text-primary font-bold slider-value">175 cm</span>
</div>

<input class="slider w-full h-2 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-primary" min="100" max="250" value="175" type="range">

<div class="flex justify-between text-[10px] text-slate-400 mt-1 px-1">
<span>100cm</span>
<span>250cm</span>
</div>
</div>
<!-- Primary Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
    <span>Create Account</span>
    <span class="material-symbols-outlined">chevron_right</span>
</button>
</form>
